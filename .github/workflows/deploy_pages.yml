name: Deploy to GitHub Pages (mycryptosafe.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web platform
        run: |
          flutter config --enable-web
          flutter create . --platforms web

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          ADMIN_PHRASE: ${{ secrets.ADMIN_PHRASE }}
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
        run: |
          flutter build web \
            --release \
            --base-href / \
            --dart-define=PWA_URL=https://mycryptosafe.fr/ \
            ${ADMIN_PHRASE:+--dart-define=ADMIN_PHRASE="$ADMIN_PHRASE"} \
            ${ADMIN_PIN:+--dart-define=ADMIN_PIN="$ADMIN_PIN"} \
            ${BACKEND_URL:+--dart-define=BACKEND_URL=$BACKEND_URL}

      - name: Write CNAME
        run: echo "mycryptosafe.fr" > build/web/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
