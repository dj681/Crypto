name: Deploy to GitHub Pages (mycryptosafe.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web platform
        run: |
          flutter config --enable-web
          flutter create . --platforms web

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          ADMIN_PHRASE: ${{ secrets.ADMIN_PHRASE }}
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          flutter build web \
            --release \
            --base-href / \
            --dart-define=PWA_URL=https://mycryptosafe.fr/ \
            ${ADMIN_PHRASE:+--dart-define=ADMIN_PHRASE="$ADMIN_PHRASE"} \
            ${ADMIN_PIN:+--dart-define=ADMIN_PIN="$ADMIN_PIN"} \
            ${ADMIN_TOKEN:+--dart-define=ADMIN_TOKEN="$ADMIN_TOKEN"} \
            ${BACKEND_URL:+--dart-define=BACKEND_URL=$BACKEND_URL} \
            ${FIREBASE_API_KEY:+--dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY"} \
            ${FIREBASE_APP_ID:+--dart-define=FIREBASE_APP_ID="$FIREBASE_APP_ID"} \
            ${FIREBASE_MESSAGING_SENDER_ID:+--dart-define=FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID"} \
            ${FIREBASE_PROJECT_ID:+--dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID"} \
            ${FIREBASE_AUTH_DOMAIN:+--dart-define=FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN"} \
            ${FIREBASE_STORAGE_BUCKET:+--dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET"} \
            ${FIREBASE_MEASUREMENT_ID:+--dart-define=FIREBASE_MEASUREMENT_ID="$FIREBASE_MEASUREMENT_ID"}

      - name: Write CNAME
        run: echo "mycryptosafe.fr" > build/web/CNAME

      - name: Copy 404 fallback for SPA routing
        run: cp 404.html build/web/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
