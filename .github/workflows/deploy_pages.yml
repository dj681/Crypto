name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable and generate web platform
        run: |
          flutter config --enable-web
          flutter create . --platforms web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release --base-href /Crypto/

      - name: Add SPA 404 fallback for route refresh
        run: |
          cat > build/web/404.html <<'EOF'
          <!doctype html>
          <html lang="fr">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Redirection…</title>
              <script>
                (function () {
                  const projectBasePath = "/Crypto/";
                  const targetUrl = new URL(projectBasePath, window.location.origin);
                  targetUrl.search = window.location.search;
                  targetUrl.hash = window.location.hash;
                  window.location.replace(targetUrl.toString());
                })();
              </script>
            </head>
            <body>
              <p>Redirection vers la page d’accueil…</p>
            </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
