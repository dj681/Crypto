<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirection…</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        // Convert a path-based URL to a hash-based URL so that Flutter web's
        // hash router receives the correct initial route.
        // e.g. /wallet/create  →  /#/wallet/create
        if (path && path !== '/') {
          window.location.replace(
            window.location.origin + '/#' + path + search + hash
          );
        } else {
          // Already at root – redirect to origin, preserving any hash fragment.
          window.location.replace(window.location.origin + (hash || '/'));
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirection vers la page d’accueil…</p>
  </body>
</html>
