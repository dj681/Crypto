<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    To learn more about using service workers from Flutter:
    https://docs.flutter.dev/development/platform-integration/web/initialization
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Votre portefeuille crypto sécurisé">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="My Crypto Safe">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>My Crypto Safe</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Loading overlay shown immediately, removed once Flutter renders its first frame -->
  <div id="loading-overlay" style="
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    font-family: sans-serif;
    gap: 16px;
    z-index: 9999;
  ">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
         stroke="#6750a4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="7" width="20" height="14" rx="2"/>
      <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      <circle cx="12" cy="14" r="2"/>
    </svg>
    <p style="color: #6750a4; font-size: 18px; font-weight: 600; margin: 0;">My Crypto Safe</p>
    <div class="spinner"></div>
  </div>
  <style>
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #e8def8;
      border-top-color: #6750a4;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay.fade-out {
      opacity: 0;
      transition: opacity 0.3s ease-out;
    }
  </style>

  <script>
    // Hide loading overlay once Flutter renders its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var overlay = document.getElementById('loading-overlay');
      if (!overlay) return;
      overlay.classList.add('fade-out');
      overlay.addEventListener('transitionend', function () { overlay.remove(); }, { once: true });
    });

    // Reload the page whenever a new service worker takes control so that
    // users always run the latest deployed build rather than a stale cached version.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        window.location.reload();
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
