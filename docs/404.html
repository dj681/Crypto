<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirection…</title>
    <script>
      (function () {
        const parts = window.location.pathname.split("/").filter(Boolean);
        const host = window.location.hostname.toLowerCase();
        const githubPagesMatch = host.match(/^([^.]+)\.github\.io$/);
        const isGitHubPagesHost = githubPagesMatch !== null;
        const username = isGitHubPagesHost ? githubPagesMatch[1] : "";
        let basePath = "/";

        if (isGitHubPagesHost && parts.length > 0) {
          if (parts[0].toLowerCase() !== username) {
            // GitHub project page: /<repo>/<...>
            basePath = "/" + parts[0] + "/";
          }
        }

        window.location.replace(window.location.origin + basePath);
      })();
    </script>
  </head>
  <body>
    <p>Redirection vers la page d’accueil…</p>
  </body>
</html>
