<html lang="fr">

    <title>Redirection…</title>
    <script>
      (function () {
        const projectBasePath = "/Crypto/";
        const basePath = window.location.pathname.startsWith(projectBasePath)
          ? projectBasePath
          : "/";
        window.location.replace(window.location.origin + basePath);
      })();
    </script>
  </head>
