<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirection…</title>
    <script>
      (function () {
        const parts = window.location.pathname.split("/").filter(Boolean);
        const host = window.location.hostname.toLowerCase();
        const isGitHubPagesHost = host.endsWith(".github.io");
        const username = isGitHubPagesHost ? host.split(".")[0] : "";
        let basePath = "/";

        if (parts.length > 0) {
          if (!isGitHubPagesHost) {
            basePath = "/" + parts[0] + "/";
          } else if (parts[0].toLowerCase() !== username) {
            // GitHub project page: /<repo>/<...>
            basePath = "/" + parts[0] + "/";
          }
        }

        window.location.replace(window.location.origin + basePath);
      })();
    </script>
  </head>
  <body>
    <p>Redirection vers la page d’accueil…</p>
  </body>
</html>
